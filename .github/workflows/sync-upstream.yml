# Daily sync: merge pyfa-org/Pyfa master into this fork's master when needed, then
# build an integration branch that merges fix branches (see env vars below) and prunes
# older auto-created integration branches on success. If upstream is unchanged but no
# integration branch exists yet, creates the first one from current master.
name: Patched Pyfa build

on:
  schedule:
    # Daily at 05:15 UTC (adjust if you prefer another window)
    - cron: "15 5 * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

env:
  UPSTREAM_REPO: pyfa-org/Pyfa
  UPSTREAM_BRANCH: master
  # Fork branches to merge into each new integration branch (after upstream sync)
  FIX_BRANCH_1: fix-projected-on-tab-switch
  # Named "focus graph" in docs; remote branch is focus-graph
  FIX_BRANCH_2: focus-graph
  INTEGRATION_PREFIX: upstream-integration
  RELEASE_TAG: windows-integration

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.integrate.outputs.should_build }}
      integration_branch: ${{ steps.integrate.outputs.integration_branch }}
      artifact_slug: ${{ steps.integrate.outputs.artifact_slug }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: integrate
        name: Sync upstream and merge fix branches
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"

          git fetch origin
          git fetch upstream "${UPSTREAM_BRANCH}"

          ahead_count="$(git rev-list --count "origin/${UPSTREAM_BRANCH}..upstream/${UPSTREAM_BRANCH}")"
          existing_count="$(git ls-remote origin "refs/heads/${INTEGRATION_PREFIX}/*" | wc -l | tr -d '[:space:]')"

          # Scheduled run with no upstream updates and existing integration branch(es) — stop
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && [ "${ahead_count}" -eq 0 ] && [ "${existing_count}" -gt 0 ]; then
            echo "No new commits on upstream/${UPSTREAM_BRANCH}; integration branch(es) already exist — nothing to do."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "integration_branch=" >> "$GITHUB_OUTPUT"
            echo "artifact_slug=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${ahead_count}" -gt 0 ]; then
            echo "Upstream is ${ahead_count} commit(s) ahead of origin/${UPSTREAM_BRANCH}; merging."
            git checkout -B "${UPSTREAM_BRANCH}" "origin/${UPSTREAM_BRANCH}"
            git merge "upstream/${UPSTREAM_BRANCH}" -m "Merge upstream ${UPSTREAM_BRANCH} ($(date -u +%Y-%m-%d))"
            git push origin "${UPSTREAM_BRANCH}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch requested; rebuilding integration branch from origin/${UPSTREAM_BRANCH}."
            git checkout -B "${UPSTREAM_BRANCH}" "origin/${UPSTREAM_BRANCH}"
          else
            echo "No new upstream commits; no ${INTEGRATION_PREFIX}/* branches yet — creating the first from origin/${UPSTREAM_BRANCH}."
            git checkout -B "${UPSTREAM_BRANCH}" "origin/${UPSTREAM_BRANCH}"
          fi

          # Unique integration branch name (safe for multiple runs per day)
          stamp="$(date -u +%Y-%m-%d-%H%M%S)"
          integration_branch="${INTEGRATION_PREFIX}/${stamp}"

          git checkout -b "${integration_branch}"

          git merge "origin/${FIX_BRANCH_1}" -m "Merge ${FIX_BRANCH_1} into ${integration_branch}"
          git merge "origin/${FIX_BRANCH_2}" -m "Merge ${FIX_BRANCH_2} into ${integration_branch}"

          git push origin "${integration_branch}"

          # Remove older auto integration branches; keep the one we just pushed
          while IFS=$'\t' read -r _ ref; do
            name="${ref#refs/heads/}"
            case "${name}" in
              "${INTEGRATION_PREFIX}/"*)
                if [ "${name}" != "${integration_branch}" ]; then
                  echo "Deleting superseded branch: ${name}"
                  git push origin --delete "${name}"
                fi
                ;;
            esac
          done < <(git ls-remote origin "refs/heads/${INTEGRATION_PREFIX}/*")

          artifact_slug="$(echo "${integration_branch}" | tr '/' '-')"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "integration_branch=${integration_branch}" >> "$GITHUB_OUTPUT"
          echo "artifact_slug=${artifact_slug}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows exe (PyInstaller)
    needs: sync
    if: needs.sync.outputs.should_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.integration_branch }}
          fetch-depth: 0

      - name: Set up Python 3.11 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Build with dist_assets/win/build_exe_only.bat
        shell: cmd
        run: dist_assets\win\build_exe_only.bat

      - name: Package Windows build
        shell: powershell
        run: |
          if (Test-Path "dist\pyfa-release.zip") {
            Remove-Item "dist\pyfa-release.zip" -Force
          }
          Compress-Archive -Path "dist\pyfa\*" -DestinationPath "dist\pyfa-release.zip" -CompressionLevel Optimal

      - name: Publish Windows zip to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INTEGRATION_BRANCH: ${{ needs.sync.outputs.integration_branch }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          release_title="Patched Pyfa build"
          release_notes="Contains 2 fixes: https://github.com/pyfa-org/Pyfa/pull/2741 and https://github.com/pyfa-org/Pyfa/pull/2742. Built from branch ${INTEGRATION_BRANCH} (run ${RUN_ID})."

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" \
              --title "${release_title}" \
              --notes "${release_notes}"
          else
            gh release edit "${RELEASE_TAG}" \
              --title "${release_title}" \
              --notes "${release_notes}"
          fi

          while IFS= read -r asset_name; do
            if [ -n "${asset_name}" ]; then
              gh release delete-asset "${RELEASE_TAG}" "${asset_name}" --yes
            fi
          done < <(gh release view "${RELEASE_TAG}" --json assets -q '.assets[].name')

          gh release upload "${RELEASE_TAG}" "dist/pyfa-release.zip"
